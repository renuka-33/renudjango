{% extends "myApp/base.html" %}
{% load static %}

{% block content %}

<table class="table table-dark">
  <thead>
    <tr>
      <th scope="col">Image</th>
      <th scope="col">Name</th>
      <th scope="col">Price</th>
    </tr>
  </thead>

  <tbody>
    {% for product in products %}
    <tr>

      <td>
        {% if product.image %}
          <img class="img-fluid"
               src="{{ product.image.url }}"
               alt="{{ product.name }}"
               width="250">
        {% else %}
          <img class="img-fluid"
               src="{% static 'product-default.png' %}"
               alt="No Image"
               width="250">
        {% endif %}
      </td>

      <td>{{ product.name }}</td>
      <td>{{ product.price }}</td>

    </tr>
    {% endfor %}
  </tbody>
</table>

{% endblock %}
